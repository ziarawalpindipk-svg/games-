<body style="margin:0;background:#1a1030;">
<div id="bb-root">
<style>
  /* ===== ORIGINAL GAME CSS ===== */
  #bb-root {
    --bg: #1a1030;
    --bg2: #2b1a4a;
    --panel: #24163f;
    --panel-line: rgba(255,255,255,0.07);
    --cell-empty: #33224f;
    --text: #f4eefc;
    --sub: #b3a0d4;
    --accent: #ff6b5b;
    --accent-dark: #c43f2e;
    --good: #2dd4bf;
    --danger: #ff4d6a;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at 25% -10%, var(--bg2) 0%, var(--bg) 55%);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding: 14px 12px 20px;
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
    -webkit-user-select: none;
    box-sizing: border-box;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    position: relative;
  }
  #bb-root * { box-sizing: border-box; }

  .bb-header {
    width: 100%;
    max-width: 380px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .bb-title {
    font-family: 'Baloo 2', 'Segoe UI', system-ui, sans-serif;
    font-size: 23px;
    font-weight: 700;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .bb-title .logo-mark {
    width: 26px; height: 26px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .bb-scorebox {
    background: var(--panel);
    border-radius: 14px;
    padding: 6px 16px;
    text-align: center;
    min-width: 78px;
    border: 1px solid var(--panel-line);
  }
  .bb-scorebox .label {
    font-size: 10px;
    color: var(--sub);
    text-transform: uppercase;
    letter-spacing: 1.2px;
  }
  .bb-scorebox .value {
    font-family: 'Baloo 2', 'Segoe UI', system-ui, sans-serif;
    font-size: 19px;
    font-weight: 700;
    color: var(--accent);
  }

  .bb-best {
    font-size: 11px;
    color: var(--sub);
    margin-bottom: 12px;
    letter-spacing: 0.3px;
  }

  #bb-board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 4px;
    width: min(88vw, 44vh, 360px);
    height: min(88vw, 44vh, 360px);
    background: var(--panel);
    padding: 9px;
    border-radius: 18px;
    box-shadow: 0 14px 34px rgba(0,0,0,0.4), inset 0 0 0 1px var(--panel-line);
    touch-action: none;
    position: relative;
  }
  .bb-cell {
    background: var(--cell-empty);
    border-radius: 6px;
    transition: background 0.12s, transform 0.12s;
  }
  .bb-cell.filled {
    box-shadow: inset 0 -3px 0 rgba(0,0,0,0.25), inset 0 2px 0 rgba(255,255,255,0.3);
  }
  .bb-cell.hint-ok { background: rgba(45, 212, 191, 0.4) !important; }
  .bb-cell.hint-bad { background: rgba(255, 77, 106, 0.4) !important; }
  .bb-cell.clearing {
    animation: bb-cascade 0.32s cubic-bezier(.3,1.4,.6,1) forwards;
    z-index: 2;
  }
  @keyframes bb-cascade {
    0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 rgba(255,255,255,0); }
    30% { transform: scale(1.22); opacity: 1; box-shadow: 0 0 18px 4px rgba(255,255,255,0.55); }
    100% { transform: scale(0.15); opacity: 0; box-shadow: 0 0 0 rgba(255,255,255,0); }
  }

  #bb-tray {
    width: min(88vw, 360px);
    display: flex;
    justify-content: space-between;
    margin-top: 14px;
    gap: 8px;
  }
  .bb-slot {
    flex: 1;
    min-height: 80px;
    background: var(--panel);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    border: 1px solid var(--panel-line);
    transition: border-color 0.15s;
  }
  .bb-slot.empty { opacity: 0.3; }
  .bb-piece-grid {
    display: grid;
    touch-action: none;
    cursor: grab;
  }
  .bb-piece-cell {
    border-radius: 4px;
    margin: 1px;
  }
  .bb-piece-grid.dragging-source { opacity: 0.25; }

  #bb-ghost {
    position: fixed;
    display: grid;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.92;
  }
  .bb-ghost-cell {
    border-radius: 6px;
  }

  #bb-overlay {
    position: absolute;
    inset: 0;
    background: rgba(15, 8, 28, 0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 22px;
    z-index: 50;
    text-align: center;
    padding: 20px;
  }
  #bb-overlay.show { display: flex; }
  #bb-overlay h2 {
    font-family: 'Baloo 2', 'Segoe UI', system-ui, sans-serif;
    margin: 0 0 6px;
    font-size: 27px;
    font-weight: 700;
  }
  #bb-overlay p { margin: 0 0 18px; color: var(--sub); font-size: 14px; }
  #bb-restart {
    background: linear-gradient(135deg, var(--accent), #ff9a3d);
    color: #2a0f0a;
    border: none;
    padding: 13px 30px;
    border-radius: 30px;
    font-family: 'Baloo 2', 'Segoe UI', system-ui, sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(255, 107, 91, 0.35);
  }
  .bb-hint {
    margin-top: 10px;
    font-size: 11px;
    color: var(--sub);
    text-align: center;
    max-width: 340px;
  }

  .bb-utility-bar {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 8px;
  }
  .bb-utility-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    flex-wrap: nowrap;
  }
  .icon-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    color: var(--sub);
    font-size: 11px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 6px 10px;
    border-radius: 16px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--text); }
  .icon-btn svg { display: block; width: 13px; height: 13px; }
  .icon-btn.active { border-color: var(--good); color: var(--text); }

  .download-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), #ff9a3d);
    color: #2a0f0a;
    font-family: 'Baloo 2', 'Segoe UI', system-ui, sans-serif;
    font-weight: 700;
    font-size: 11.5px;
    padding: 7px 13px;
    border-radius: 16px;
    text-decoration: none;
    box-shadow: 0 4px 10px rgba(255, 107, 91, 0.35);
    cursor: pointer;
    border: none;
    white-space: nowrap;
  }

  .bb-volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 380px;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 12px;
    padding: 5px 12px;
  }
  .bb-volume-row svg { flex-shrink: 0; color: var(--sub); width: 14px; height: 14px; }
  .bb-volume-row input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    border-radius: 4px;
    background: var(--cell-empty);
    outline: none;
  }
  .bb-volume-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }
  .bb-volume-row input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    border: none;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .bb-volume-label {
    font-size: 10px;
    color: var(--sub);
    min-width: 28px;
    text-align: right;
  }

  .bb-stats-line {
    font-size: 11px;
    color: var(--sub);
    margin-top: 2px;
  }
  .bb-history {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 14px;
    max-width: 300px;
  }
  .bb-history-chip {
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 10px;
    padding: 5px 10px;
    font-size: 12px;
    color: var(--sub);
  }

  #ad-banner-top {
    width: 100%;
    max-width: 360px;
    min-height: 50px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    overflow: hidden;
  }
</style>

  <div class="bb-utility-bar">
    <div class="bb-utility-row">
      <button class="icon-btn active" id="bb-sound-toggle" title="Toggle sound effects">
        <svg id="bb-sound-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

      </button>
      <a class="download-btn" id="bb-download-link" href="#" target="_blank">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3v12m0 0l-4-4m4 4l4-4M5 19h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download
      </a>
    </div>

    <div class="bb-volume-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

      <span style="font-size:10px;color:var(--sub);min-width:38px;">Sound</span>
      <input type="range" id="bb-sfx-volume-slider" min="0" max="100" value="100">
      <span class="bb-volume-label" id="bb-sfx-volume-label">100%</span>
    </div>
    <div class="bb-volume-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 18V5l12-2v13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="6" cy="18" r="3" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="18" cy="16" r="3" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      <span style="font-size:10px;color:var(--sub);min-width:38px;">Music</span>
      <input type="range" id="bb-music-volume-slider" min="0" max="100" value="70">
      <span class="bb-volume-label" id="bb-music-volume-label">70%</span>
    </div>
  </div>

  <div class="bb-header">

    <div class="bb-title">
      <span class="logo-mark">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="13" width="10" height="10" rx="2.5" fill="#ff6b5b"/>
          <rect x="13" y="13" width="10" height="10" rx="2.5" fill="#2dd4bf"/>
          <rect x="7" y="1" width="10" height="10" rx="2.5" fill="#ffc145"/>
        </svg>
      </span>
      Block Cascade
    </div>
    <div class="bb-scorebox">
      <div class="label">Score</div>
      <div class="value" id="bb-score">0</div>
    </div>
  </div>
  <div class="bb-best" id="bb-best">Best: 0 &bull; Total: 0</div>

  <!-- ===== AD BANNER ===== -->
  <div id="ad-banner-top"></div>

  <div id="bb-board"></div>

  <div id="bb-tray">
    <div class="bb-slot" data-slot="0"></div>
    <div class="bb-slot" data-slot="1"></div>
    <div class="bb-slot" data-slot="2"></div>
  </div>

  <div class="bb-hint">Drag blocks onto the grid. Fill a full row or column to clear it.</div>

  <div style="margin-top:10px;display:flex;gap:16px;font-size:11px;">
    <a href="index.html" style="color:#b3a0d4;text-decoration:none;">🏠 Home</a>
    <a href="about_us.html" style="color:#b3a0d4;text-decoration:none;">About</a>

  </div>

  <div id="bb-overlay">
    <h2>Game Over</h2>
    <p id="bb-final-score">Score: 0</p>
    <p id="bb-overlay-stats" style="margin-top:-10px;font-size:12.5px;color:var(--sub);">Best: 0 &bull; Total: 0</p>

    <div class="bb-history" id="bb-history"></div>

  </div>
</div>
